<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agentflow-demo</title>
  <style>
    :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
    .card h2 { font-size: 1rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
    .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
    .badge--todo { background: var(--yellow); color: #000; }
    .badge--progress { background: var(--accent); color: #000; }
    .badge--done { background: var(--green); color: #000; }
    .task { padding: 0.5rem 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .task:last-child { border-bottom: none; }
    .task-title { font-size: 0.875rem; }
    .task-priority { color: var(--muted); font-size: 0.75rem; }
    .health { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0.75rem; border-radius: 16px; font-size: 0.8rem; }
    .health--ok { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .health--err { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .sort-bar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem; font-size: 0.8rem; color: var(--muted); }
    .sort-bar select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 0.8rem; }
    .sort-bar button { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.8rem; }
    .sort-bar button:hover { border-color: var(--accent); }
    .footer { margin-top: 2rem; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>agentflow-demo</h1>
  <p class="subtitle">
    Minimal task manager for <a href="https://github.com/cordsjon/agentflow">agentflow</a> governance demos
    <span class="health" id="health"></span>
  </p>

  <div class="sort-bar">
    Sort by:
    <select id="sort-by">
      <option value="priority">Priority</option>
      <option value="created_at">Created</option>
      <option value="title">Title</option>
      <option value="status">Status</option>
    </select>
    <button id="sort-dir" title="Toggle sort direction">Asc ↑</button>
  </div>

  <div class="grid">
    <div class="card">
      <h2>To Do <span class="badge badge--todo" id="todo-count">0</span></h2>
      <div id="todo-list"></div>
    </div>
    <div class="card">
      <h2>In Progress <span class="badge badge--progress" id="progress-count">0</span></h2>
      <div id="progress-list"></div>
    </div>
    <div class="card">
      <h2>Done <span class="badge badge--done" id="done-count">0</span></h2>
      <div id="done-list"></div>
    </div>
  </div>

  <p class="footer">
    API docs: <a href="/docs">/docs</a> &middot;
    Health: <a href="/api/health">/api/health</a> &middot;
    Tasks: <a href="/api/tasks">/api/tasks</a>
  </p>

  <script>
    let sortBy = 'priority';
    let sortDir = 'asc';

    async function load() {
      try {
        const health = await fetch('/api/health').then(r => r.json());
        document.getElementById('health').textContent = `${health.status} (${health.tasks} tasks)`;
        document.getElementById('health').className = 'health health--ok';
      } catch {
        document.getElementById('health').textContent = 'offline';
        document.getElementById('health').className = 'health health--err';
      }

      const tasks = await fetch(`/api/tasks?sort_by=${sortBy}&sort_dir=${sortDir}`).then(r => r.json());
      const groups = { todo: [], in_progress: [], done: [] };
      tasks.forEach(t => (groups[t.status] || groups.todo).push(t));

      render('todo-list', 'todo-count', groups.todo);
      render('progress-list', 'progress-count', groups.in_progress);
      render('done-list', 'done-count', groups.done);
    }

    function render(listId, countId, tasks) {
      document.getElementById(countId).textContent = tasks.length;
      document.getElementById(listId).innerHTML = tasks.map(t =>
        `<div class="task"><span class="task-title">${t.title}</span><span class="task-priority">#${t.priority}</span></div>`
      ).join('');
    }

    document.getElementById('sort-by').addEventListener('change', e => {
      sortBy = e.target.value;
      load();
    });

    document.getElementById('sort-dir').addEventListener('click', e => {
      sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      e.target.textContent = sortDir === 'asc' ? 'Asc ↑' : 'Desc ↓';
      load();
    });

    load();
  </script>
</body>
</html>
